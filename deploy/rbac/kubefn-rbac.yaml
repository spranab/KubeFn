---
# KubeFn RBAC — Namespace-scoped, least-privilege
# Install: kubectl apply -f deploy/rbac/kubefn-rbac.yaml -n kubefn

# Service account for the runtime
apiVersion: v1
kind: ServiceAccount
metadata:
  name: kubefn-runtime
  labels:
    app.kubernetes.io/name: kubefn
    app.kubernetes.io/component: runtime
---
# Role: runtime needs to read ConfigMaps (function JARs) and watch CRDs
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: kubefn-runtime
  labels:
    app.kubernetes.io/name: kubefn
rules:
  - apiGroups: [""]
    resources: ["configmaps", "secrets"]
    verbs: ["get", "list", "watch"]
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list"]
  - apiGroups: ["kubefn.com"]
    resources: ["kubefnfunctions", "kubefngroups"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: kubefn-runtime
  labels:
    app.kubernetes.io/name: kubefn
subjects:
  - kind: ServiceAccount
    name: kubefn-runtime
roleRef:
  kind: Role
  name: kubefn-runtime
  apiGroup: rbac.authorization.k8s.io
---
# Service account for the operator (needs more permissions)
apiVersion: v1
kind: ServiceAccount
metadata:
  name: kubefn-operator
  labels:
    app.kubernetes.io/name: kubefn
    app.kubernetes.io/component: operator
---
# ClusterRole: operator manages Deployments and Services from CRDs
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: kubefn-operator
  labels:
    app.kubernetes.io/name: kubefn
rules:
  - apiGroups: ["kubefn.com"]
    resources: ["kubefngroups", "kubefngroups/status", "kubefnfunctions", "kubefnfunctions/status"]
    verbs: ["get", "list", "watch", "update", "patch"]
  - apiGroups: ["apps"]
    resources: ["deployments"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: [""]
    resources: ["services", "configmaps"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: [""]
    resources: ["events"]
    verbs: ["create", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: kubefn-operator
  labels:
    app.kubernetes.io/name: kubefn
subjects:
  - kind: ServiceAccount
    name: kubefn-operator
    namespace: kubefn  # Change to your namespace
roleRef:
  kind: ClusterRole
  name: kubefn-operator
  apiGroup: rbac.authorization.k8s.io
---
# Network policy: restrict admin port access
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: kubefn-admin-restrict
  labels:
    app.kubernetes.io/name: kubefn
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: kubefn-runtime
  policyTypes:
    - Ingress
  ingress:
    # Allow function traffic on port 8080 from anywhere in namespace
    - ports:
        - port: 8080
          protocol: TCP
    # Restrict admin port 8081 to same namespace only
    - ports:
        - port: 8081
          protocol: TCP
      from:
        - podSelector: {}  # Same namespace only
