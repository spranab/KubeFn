apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: kubefnfunctions.kubefn.com
  labels:
    {{- include "kubefn.labels" . | nindent 4 }}
  annotations:
    helm.sh/resource-policy: keep
spec:
  group: kubefn.com
  versions:
    - name: v1alpha1
      served: true
      storage: true
      schema:
        openAPIV3Schema:
          type: object
          properties:
            spec:
              type: object
              required:
                - groupRef
                - className
                - route
              properties:
                groupRef:
                  type: string
                  description: Name of the KubeFnGroup this function belongs to
                className:
                  type: string
                  description: Fully qualified class name of the handler
                route:
                  type: object
                  required:
                    - path
                  properties:
                    path:
                      type: string
                    methods:
                      type: array
                      items:
                        type: string
                      default: ["GET", "POST"]
                source:
                  type: object
                  properties:
                    type:
                      type: string
                      enum: [configmap, pvc]
                      default: configmap
                    configMapRef:
                      type: object
                      properties:
                        name:
                          type: string
            status:
              type: object
              properties:
                loaded:
                  type: boolean
                lastDeployed:
                  type: string
                  format: date-time
                errors:
                  type: array
                  items:
                    type: string
      subresources:
        status: {}
      additionalPrinterColumns:
        - name: Group
          type: string
          jsonPath: .spec.groupRef
        - name: Path
          type: string
          jsonPath: .spec.route.path
        - name: Class
          type: string
          jsonPath: .spec.className
        - name: Loaded
          type: boolean
          jsonPath: .status.loaded
        - name: Age
          type: date
          jsonPath: .metadata.creationTimestamp
  scope: Namespaced
  names:
    plural: kubefnfunctions
    singular: kubefnfunction
    kind: KubeFnFunction
    shortNames:
      - kff
