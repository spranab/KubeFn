apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: kubefngroups.kubefn.com
  labels:
    {{- include "kubefn.labels" . | nindent 4 }}
  annotations:
    helm.sh/resource-policy: keep
spec:
  group: kubefn.com
  versions:
    - name: v1alpha1
      served: true
      storage: true
      schema:
        openAPIV3Schema:
          type: object
          properties:
            spec:
              type: object
              required:
                - image
              properties:
                isolationMode:
                  type: string
                  enum: [shared-jvm, isolated-jvm, isolated-pod]
                  default: shared-jvm
                replicas:
                  type: integer
                  default: 1
                  minimum: 0
                image:
                  type: string
                resources:
                  type: object
                  properties:
                    requests:
                      type: object
                      properties:
                        cpu:
                          type: string
                        memory:
                          type: string
                    limits:
                      type: object
                      properties:
                        cpu:
                          type: string
                        memory:
                          type: string
                jvmArgs:
                  type: array
                  items:
                    type: string
                config:
                  type: object
                  x-kubernetes-preserve-unknown-fields: true
            status:
              type: object
              properties:
                readyReplicas:
                  type: integer
                loadedFunctions:
                  type: array
                  items:
                    type: string
                revisionId:
                  type: string
                phase:
                  type: string
                  enum: [Pending, Running, Failed]
      subresources:
        status: {}
      additionalPrinterColumns:
        - name: Isolation
          type: string
          jsonPath: .spec.isolationMode
        - name: Replicas
          type: integer
          jsonPath: .spec.replicas
        - name: Phase
          type: string
          jsonPath: .status.phase
        - name: Functions
          type: string
          jsonPath: .status.loadedFunctions
        - name: Age
          type: date
          jsonPath: .metadata.creationTimestamp
  scope: Namespaced
  names:
    plural: kubefngroups
    singular: kubefngroup
    kind: KubeFnGroup
    shortNames:
      - kfg
