name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Grant execute permission
        run: chmod +x gradlew

      - name: Build
        run: ./gradlew build

      - name: Run tests
        run: ./gradlew :kubefn-api:test :kubefn-runtime:test --rerun

      - name: Build runtime shadow JAR
        run: ./gradlew :kubefn-runtime:shadowJar

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: |
            kubefn-api/build/reports/tests/
            kubefn-runtime/build/reports/tests/

      - name: Upload runtime JAR
        uses: actions/upload-artifact@v4
        with:
          name: kubefn-runtime
          path: kubefn-runtime/build/libs/kubefn-runtime-*-all.jar
